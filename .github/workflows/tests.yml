name: Java Tests con JUnit

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar JUnit y compilar
        run: |
          wget -q https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar
          wget -q https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar
          javac -cp .:junit-4.13.2.jar Calculadora.java CalculadoraTest.java

      - name: Ejecutar tests
        run: |
          java -cp .:junit-4.13.2.jar:hamcrest-core-1.3.jar org.junit.runner.JUnitCore CalculadoraTest